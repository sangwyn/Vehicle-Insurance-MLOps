sources:
  - name: "insurance_main"
    path: "../data/motor_data11-14lats.csv"
  - name: "insurance_extra"
    path: "../data/motor_data14-2018.csv"

stream:
  batch_size: 200
  sleep_seconds: 1.0
  max_batches: null 
  mix_sources: true

storage:
  db_path: "raw_data.db"
  raw_table: "raw_data"
  meta_table: "batch_meta"

logging:
  level: "INFO"
  file: "logs/collector.log"
  console: true
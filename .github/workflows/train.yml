name: Train Pipeline (CI)

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full MLOps pipeline
        run: |
          python full_pipeline.py --config configs/default.yaml

      - name: Create Job Summary
        run: |
          python << 'PY'
          import json, glob, os
          from pathlib import Path

          reports = sorted(glob.glob("logs/train_report_*/train_report.json"))
          if not reports:
              print("No training reports found.")
              exit(0)

          md = "## Model Training Report\n\n"
          md += "| Run | Model | MAE | RMSE | R2 |\n"
          md += "|-----|-------|-----|------|----|\n"

          for r in reports:
              with open(r) as f:
                  data = json.load(f)
              run = Path(r).parent.name
              model = data.get("model", "-")
              m = data.get("metrics", {})
              md += f"| {run} | {model} | {m.get('test_mae', '-')} | {m.get('test_rmse', '-')} | {m.get('test_r2', '-')} |\n"

          print(md)
          PY
        shell: bash

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: training-logs-${{ github.run_id }}
          path: logs/**
          retention-days: 30
          if-no-files-found: warn

      - name: Upload model release artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-release
          path: |
            model/*.joblib
            requirements.txt
            main.py
            configs/default.yaml
            utils.py
            Data_Preparation/**
          retention-days: 30
          if-no-files-found: warn

      - name: Upload collector state artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collector-state
          path: |
            storage/preprocessor.joblib
            configs/default.yaml
          retention-days: 30
          if-no-files-found: warn
